<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Cohort Sustainability - GitHub Linked</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { padding: 20px; background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container-fluid { max-width: 1400px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        .table-responsive { max-height: 700px; overflow-y: auto; }
        table { font-size: 0.85rem; }
        th { position: sticky; top: 0; background-color: #0d6efd !important; color: white; z-index: 10; }
        .vintage-label { background-color: #e9ecef; font-weight: bold; position: sticky; left: 0; z-index: 5; }
        #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; }
        .percentage-cell { transition: background 0.3s; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1">Cohort Sustainability Dashboard</h2>
                <p class="text-muted small">Data Source: <a href="https://github.com/dhy-519/cbn-crm-sustainability" target="_blank">GitHub Repository</a></p>
            </div>
            
            <div class="d-flex gap-3">
                <div class="btn-group" role="group">
                    <input type="radio" class="btn-check" name="viewType" id="btnAbsolute" checked onclick="renderTable('absolute')">
                    <label class="btn btn-outline-primary" for="btnAbsolute">Count (Absolute)</label>
                    <input type="radio" class="btn-check" name="viewType" id="btnPercentage" onclick="renderTable('percentage')">
                    <label class="btn btn-outline-primary" for="btnPercentage">Percentage (%)</label>
                </div>
                <button class="btn btn-sm btn-secondary" onclick="fetchData()">Refresh Data</button>
            </div>
        </div>

        <div id="loading">
            <div class="spinner-border text-primary mb-2" role="status"></div>
            <span>Memproses data dari GitHub... (±90k baris)</span>
        </div>

        <div id="table-container" class="table-responsive d-none">
            <table class="table table-bordered table-hover text-center align-middle" id="cohortTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // MENGGUNAKAN LINK RAW AGAR DATA CSV BISA TERBACA OLEH SCRIPT
    const csvUrl = 'https://raw.githubusercontent.com/dhy-519/cbn-crm-sustainability/main/EOP_summary_JaTeng.csv';

    let globalPivotData = {};
    let globalPeriods = [];
    let globalVintages = [];
    let globalColumnSums = {};

    async function fetchData() {
        showLoading(true);
        
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                processData(results.data);
                renderTable('absolute');
                showLoading(false);
            },
            error: function(err) {
                alert("Gagal mengambil data dari GitHub. Pastikan file CSV tersedia di link tersebut.");
                console.error(err);
                showLoading(false);
            }
        });
    }

    function processData(data) {
        const pivot = {};
        const periodsSet = new Set();
        const vintagesSet = new Set();
        const colSums = {};

        data.forEach(row => {
            const period = row['active_periode'];
            const vintage = row['Vintage'];
            
            if (!period || vintage === undefined) return;

            periodsSet.add(period);
            vintagesSet.add(vintage);

            if (!pivot[vintage]) pivot[vintage] = {};
            if (!pivot[vintage][period]) pivot[vintage][period] = 0;

            pivot[vintage][period]++;
            
            if (!colSums[period]) colSums[period] = 0;
            colSums[period]++;
        });

        globalPivotData = pivot;
        globalPeriods = Array.from(periodsSet).sort();
        globalVintages = Array.from(vintagesSet).sort((a, b) => a - b);
        globalColumnSums = colSums;
    }

    function renderTable(type) {
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');

        let headHtml = `<tr><th>Vintage \\ Period</th>`;
        globalPeriods.forEach(p => {
            headHtml += `<th>${p}</th>`;
        });
        headHtml += `</tr>`;
        thead.innerHTML = headHtml;

        let bodyHtml = '';
        globalVintages.forEach(v => {
            bodyHtml += `<tr><td class="vintage-label">${v}</td>`;
            globalPeriods.forEach(p => {
                const val = globalPivotData[v][p] || 0;
                if (type === 'absolute') {
                    bodyHtml += `<td>${val.toLocaleString('id-ID')}</td>`;
                } else {
                    const total = globalColumnSums[p] || 1;
                    const perc = ((val / total) * 100).toFixed(2);
                    const color = getHeatmapColor(perc);
                    bodyHtml += `<td style="background-color: ${color}">${perc}%</td>`;
                }
            });
            bodyHtml += `</tr>`;
        });
        tbody.innerHTML = bodyHtml;
    }

    function getHeatmapColor(value) {
        const intensity = Math.min(value * 5, 255); 
        return `rgba(40, 167, 69, ${value / 100})`;
    }

    function showLoading(isLoading) {
        const loading = document.getElementById('loading');
        const container = document.getElementById('table-container');
        if (isLoading) {
            loading.classList.remove('d-none');
            container.classList.add('d-none');
        } else {
            loading.classList.add('d-none');
            container.classList.remove('d-none');
        }
    }

    fetchData();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
